services:
  db:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    #ports:
    #  - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 1s
      timeout: 2s
      retries: 10
      start_period: 1s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    working_dir: /workspace/api
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy
    #ports:
    #  - "8000:8000"

  db-backup:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BACKUP_DIR: /backups
      BACKUP_UID: ${BACKUP_UID}
      BACKUP_GID: ${BACKUP_GID}
      BACKUP_INTERVAL_MINUTES: ${BACKUP_INTERVAL_MINUTES:-360}
    command: ["/bin/sh", "/opt/backup/backup-loop.sh"]
    volumes:
      - ./db:/opt/backup:ro
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://api:8000}
      VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-}
    working_dir: /workspace/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8081"
    volumes:
      - .:/workspace
    depends_on:
      - api
    ports:
      - "${BIND_ADDRESS-0.0.0.0}:8081:8081"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${BIND_ADDRESS-0.0.0.0}:8082:80"

volumes:
  postgres-data:
